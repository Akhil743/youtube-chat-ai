<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #f0f0f5;
    }
    .popup-header {
      padding: 16px;
      background: #1a1a2e;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .popup-header svg { color: #e94560; }
    .popup-header h1 { font-size: 1rem; font-weight: 600; }
    .popup-body { padding: 20px 16px; }
    .popup-body p {
      font-size: 0.85rem;
      color: #a0a0b8;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }
    .status.active { background: rgba(74,222,128,0.1); color: #4ade80; }
    .status.inactive { background: rgba(233,69,96,0.1); color: #e94560; }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status.active .status-dot { background: #4ade80; }
    .status.inactive .status-dot { background: #e94560; }
    .open-btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
    }
    .open-btn:hover { opacity: 0.9; }
    .popup-footer {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      text-align: center;
    }
    .popup-footer a {
      color: #667eea;
      text-decoration: none;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M22.54 6.42a2.78 2.78 0 00-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 00-1.94 2A29.94 29.94 0 001 12a29.94 29.94 0 00.46 5.58 2.78 2.78 0 001.94 2C5.12 20 12 20 12 20s6.88 0 8.6-.46a2.78 2.78 0 001.94-2A29.94 29.94 0 0023 12a29.94 29.94 0 00-.46-5.58z"/>
      <polygon points="9.75,15.02 15.5,12 9.75,8.98"/>
    </svg>
    <h1>YouTube Chat AI</h1>
  </div>
  <div class="popup-body">
    <div id="status" class="status inactive">
      <span class="status-dot"></span>
      <span id="statusText">Not on a YouTube video page</span>
    </div>
    <p>Navigate to any YouTube video and the chat sidebar will appear automatically. Click the chat icon on the right side of the video to toggle it.</p>
    <a href="https://akhilrajs.com/youtube-chat/" target="_blank" class="open-btn">Open Full Web App</a>
  </div>
  <div class="popup-footer">
    <a href="https://akhilrajs.com" target="_blank">Built by Akhil S</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
